<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="健身日历">
<meta name="theme-color" content="#8a1c1c">
<title>健身日历</title>
<style>
  :root{
    --bg:#f5f4f2; --card:#fff; --ink:#222; --sub:#888; --line:#eee;
    --red:#e8552e; --A:#e8552e; --B:#3a7d44; --C:#2f7dc4; --D:#e0962e;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif}
  body{padding-bottom:calc(64px + var(--safe-b))}
  header{position:sticky;top:0;z-index:5;background:#8a1c1c;color:#fff;
    padding:calc(12px + var(--safe-t)) 16px 12px;text-align:center}
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:1px}
  header .sub{font-size:12px;opacity:.8;margin-top:2px}
  .wrap{max-width:560px;margin:0 auto;padding:14px}

  /* today */
  .badge{display:inline-block;color:#fff;font-weight:700;font-size:13px;
    padding:3px 10px;border-radius:20px;margin-right:8px}
  .day-head{display:flex;align-items:center;margin-bottom:6px}
  .day-head h2{margin:0;font-size:20px}
  .day-head .en{font-size:11px;color:var(--sub);letter-spacing:1px;margin-top:2px}
  .progress{height:8px;border-radius:8px;background:var(--line);overflow:hidden;margin:10px 0 18px}
  .progress > i{display:block;height:100%;background:var(--red);width:0;transition:width .3s}

  .grp{font-size:12px;color:var(--sub);margin:16px 0 8px;font-weight:600}
  .grp .scheme{color:var(--ink);font-weight:700;margin-left:4px}
  .grp .rest{margin-left:6px}

  .ex{display:flex;align-items:center;background:var(--card);border-radius:14px;
    padding:14px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.05);
    cursor:pointer;user-select:none;transition:background .15s}
  .ex:active{background:#fafafa}
  .ex .chk{width:26px;height:26px;border-radius:50%;border:2px solid #ccc;
    flex:0 0 26px;margin-right:14px;display:flex;align-items:center;justify-content:center;
    color:#fff;font-size:15px;transition:all .15s}
  .ex.on .chk{background:var(--red);border-color:var(--red)}
  .ex .name{font-size:17px;font-weight:600}
  .ex.on .name{color:var(--sub);text-decoration:line-through}
  .ex .tag{margin-left:auto;font-size:11px;color:var(--sub)}

  .move-row{display:flex;gap:10px;margin-top:22px}
  .move-row button{flex:1;border:1px solid var(--line);background:var(--card);border-radius:12px;
    padding:12px 8px;font-size:14px;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.04)}
  .move-row button:disabled{color:#bbb;background:#f7f6f5}
  .move-hint{font-size:11px;color:var(--sub);text-align:center;margin-top:8px}
  .rest-day{text-align:center;color:var(--sub);padding:60px 20px}
  .rest-day .big{font-size:40px;margin-bottom:10px}
  .done-banner{background:#eaf6ec;color:#3a7d44;border-radius:12px;
    padding:12px;text-align:center;font-weight:700;margin-bottom:14px}

  /* calendar */
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-nav button{background:var(--card);border:none;border-radius:10px;padding:8px 16px;
    font-size:16px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
  .cal-nav .title{font-weight:700;font-size:17px}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .grid .wd{text-align:center;font-size:11px;color:var(--sub);padding:4px 0}
  .cell{aspect-ratio:1;border-radius:10px;background:var(--card);position:relative;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    box-shadow:0 1px 2px rgba(0,0,0,.04);font-size:14px}
  .cell.empty{background:transparent;box-shadow:none}
  .cell .d{color:var(--ink)}
  .cell.train{color:#fff;font-weight:700}
  .cell.train .d{color:#fff}
  .cell .lbl{font-size:9px;opacity:.9;margin-top:1px}
  .cell.today{outline:2px solid #8a1c1c;outline-offset:1px}
  .cell .mark{position:absolute;top:2px;right:4px;font-size:11px}
  .legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;font-size:12px;color:var(--sub)}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:-1px}

  /* tabbar */
  .tabbar{position:fixed;left:0;right:0;bottom:0;display:flex;background:#fff;
    border-top:1px solid var(--line);padding-bottom:var(--safe-b);z-index:10}
  .tabbar button{flex:1;background:none;border:none;padding:10px 0;font-size:12px;
    color:var(--sub);display:flex;flex-direction:column;align-items:center;gap:2px}
  .tabbar button .ico{font-size:20px}
  .tabbar button.on{color:#8a1c1c;font-weight:700}
  .hide{display:none}
</style>
</head>
<body>
<header>
  <h1>健身日历</h1>
  <div class="sub" id="dateLine"></div>
</header>

<div class="wrap">
  <section id="todayView"></section>
  <section id="calView" class="hide"></section>
</div>

<nav class="tabbar">
  <button id="tabToday" class="on" onclick="switchTab('today')"><span class="ico">🏋️</span>今日</button>
  <button id="tabCal" onclick="switchTab('cal')"><span class="ico">📅</span>日历</button>
</nav>

<script>
/* ---------- data ---------- */
const GROUPS = {
  big:  {label:'大肌群', scheme:'3~4组 × 6~10次',  rest:'休息90~120秒'},
  small:{label:'小肌群', scheme:'2~3组 × 8~12次',  rest:'休息60~90秒'},
  aux:  {label:'辅助项', scheme:'2~3组 × 12~20次', rest:'休息30~60秒'},
};
const A_ITEMS = [
  {n:'哑铃卧推',g:'big'},{n:'上斜哑铃卧推',g:'big'},{n:'哑铃飞鸟',g:'big'},
  {n:'颈后哑铃臂屈伸',g:'small'},{n:'哑铃单腿提踵',g:'aux'},
];
const WORKOUTS = {
  A:{key:'A',name:'胸部 + 肱三',en:'CHEST + TRICEPS',color:'var(--A)',items:A_ITEMS},
  B:{key:'B',name:'背部 + 肱二',en:'BACK + BICEPS',color:'var(--B)',items:[
    {n:'俯身哑铃划船',g:'big'},{n:'俯身哑铃划船',g:'big'},{n:'单臂哑铃划船',g:'big'},
    {n:'哑铃弯举',g:'small'},{n:'哑铃弯举',g:'small'},
  ]},
  C:{key:'C',name:'胸部 + 肱三',en:'CHEST + TRICEPS',color:'var(--C)',items:A_ITEMS},
  D:{key:'D',name:'臀腿 + 肩部',en:'LEGS + SHOULDERS',color:'var(--D)',items:[
    {n:'高脚杯深蹲',g:'big'},{n:'哑铃硬拉',g:'big'},
    {n:'哑铃推举',g:'small'},{n:'阿诺德推举',g:'small'},{n:'哑铃侧平举',g:'small'},
  ]},
};
// weekday -> workout key. JS getDay(): 0=Sun..6=Sat
const SCHEDULE = {1:'A', 3:'B', 5:'C', 0:'D'};
const WD_CN = ['周日','周一','周二','周三','周四','周五','周六'];

/* ---------- storage ---------- */
const STORE_KEY = 'fitlog_v1';
const OVR_KEY   = 'fitovr_v1';   // per-date override: 'rest' = moved away | 'A'/'B'/'C'/'D' = moved in
function loadJSON(k){ try{return JSON.parse(localStorage.getItem(k))||{}}catch(e){return {}} }
function saveLog(){ localStorage.setItem(STORE_KEY, JSON.stringify(LOG)); }
function saveOvr(){ localStorage.setItem(OVR_KEY, JSON.stringify(OVR)); }
let LOG = loadJSON(STORE_KEY);  // { 'YYYY-MM-DD': [doneIdx,...] }
let OVR = loadJSON(OVR_KEY);    // { 'YYYY-MM-DD': 'rest'|'A'|'B'|'C'|'D' }

function ymd(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function addDays(d,n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function effectiveWorkout(d){
  const key = ymd(d);
  if(key in OVR){ return OVR[key]==='rest' ? null : WORKOUTS[OVR[key]]; }
  return WORKOUTS[SCHEDULE[d.getDay()]] || null;
}
function doneSet(key){ return new Set(LOG[key]||[]); }
function isComplete(d){
  const w = effectiveWorkout(d); if(!w) return false;
  return doneSet(ymd(d)).size >= w.items.length;
}

/* ---------- today view ---------- */
let viewDate = new Date();           // date shown in 今日 (default today)
function renderToday(){
  const d = viewDate, w = effectiveWorkout(d);
  const isToday = ymd(d)===ymd(new Date());
  document.getElementById('dateLine').textContent =
    d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 · '+WD_CN[d.getDay()]
    + (isToday?'（今天）':'');
  const root = document.getElementById('todayView');

  if(!w){
    root.innerHTML = '<div class="rest-day"><div class="big">🛌</div><div>'
      + (isToday?'今日休息':'休息日')+'</div>'
      + '<div style="margin-top:8px;font-size:13px">训练日：周一·三·五·日</div></div>'
      + dayNav(d);
    return;
  }

  let groupsHtml = '', lastG = null;
  w.items.forEach((it,idx)=>{
    if(it.g!==lastG){
      const G = GROUPS[it.g];
      groupsHtml += '<div class="grp">'+G.label
        +'<span class="scheme">'+G.scheme+'</span>'
        +'<span class="rest">· '+G.rest+'</span></div>';
      lastG = it.g;
    }
    groupsHtml += '<div class="ex" data-idx="'+idx+'" onclick="toggleEx('+idx+',this)">'
      +'<span class="chk">✓</span><span class="name">'+it.n+'</span>'
      +'<span class="tag">'+GROUPS[it.g].label+'</span></div>';
  });

  root.innerHTML =
    '<div id="bannerSlot"></div>'
    + '<div class="day-head"><span class="badge" style="background:'+w.color+'">'+w.key+'</span>'
    + '<div><h2>'+w.name+'</h2><div class="en">'+w.en+'</div></div></div>'
    + '<div class="progress"><i id="progBar" style="background:'+w.color+'"></i></div>'
    + groupsHtml + moveControls(d);
  updateUI();
}

// move-day controls: shift this training day to prev/next day if that day is currently rest
function moveControls(d){
  const prevOk = effectiveWorkout(addDays(d,-1))===null;
  const nextOk = effectiveWorkout(addDays(d, 1))===null;
  return '<div class="move-row">'
    + '<button onclick="moveDay(-1)"'+(prevOk?'':' disabled')+'>← 调整到前一天</button>'
    + '<button onclick="moveDay(1)"'+(nextOk?'':' disabled')+'>调整到后一天 →</button></div>'
    + ((!prevOk||!nextOk)?'<div class="move-hint">灰色方向当天已有计划，不能调整</div>':'');
}
// rest-day nav: let user step to adjacent days
function dayNav(d){
  return '<div class="move-row">'
    + '<button onclick="stepDay(-1)">← 前一天</button>'
    + '<button onclick="stepDay(1)">后一天 →</button></div>';
}
function stepDay(n){ viewDate = addDays(viewDate, n); renderToday(); }

function moveDay(n){
  const src = viewDate, tgt = addDays(src, n);
  const w = effectiveWorkout(src);
  if(!w) return;
  if(effectiveWorkout(tgt)!==null){ return; }   // target already has a plan
  const sKey = ymd(src), tKey = ymd(tgt);
  OVR[sKey] = 'rest';
  OVR[tKey] = w.key;
  if(LOG[sKey]){ LOG[tKey] = LOG[sKey]; delete LOG[sKey]; saveLog(); }
  saveOvr();
  viewDate = tgt;          // follow the workout to its new day
  renderToday();
}

function toggleEx(idx, el){
  const key = ymd(viewDate);
  const arr = LOG[key] ? LOG[key].slice() : [];
  const at = arr.indexOf(idx);
  if(at>=0) arr.splice(at,1); else arr.push(idx);
  if(arr.length) LOG[key]=arr; else delete LOG[key];
  saveLog();
  el.classList.toggle('on');   // instant in-place update
  updateUI();
}

function updateUI(){
  const key = ymd(viewDate), w = effectiveWorkout(viewDate);
  if(!w) return;
  const size = doneSet(key).size, total = w.items.length;
  const bar = document.getElementById('progBar');
  if(bar) bar.style.width = Math.round(size/total*100)+'%';
  const slot = document.getElementById('bannerSlot');
  if(slot) slot.innerHTML = size>=total
    ? '<div class="done-banner">✅ 训练已完成，干得漂亮！</div>' : '';
}

/* ---------- calendar view ---------- */
let calY, calM;  // year, month(0-11)
function renderCal(){
  const root = document.getElementById('calView');
  const first = new Date(calY, calM, 1);
  const startPad = first.getDay();               // 0=Sun
  const daysIn = new Date(calY, calM+1, 0).getDate();
  const todayKey = ymd(new Date());

  let cells = '';
  for(let i=0;i<startPad;i++) cells += '<div class="cell empty"></div>';
  for(let day=1; day<=daysIn; day++){
    const d = new Date(calY, calM, day), key = ymd(d), w = effectiveWorkout(d);
    const isToday = key===todayKey;
    if(w){
      const complete = isComplete(d);
      cells += '<div class="cell train'+(isToday?' today':'')+'" '
        + 'style="background:'+w.color+'" onclick="jumpTo('+calY+','+calM+','+day+')">'
        + (complete?'<span class="mark">✓</span>':'')
        + '<span class="d">'+day+'</span><span class="lbl">'+w.key+'</span></div>';
    } else {
      cells += '<div class="cell'+(isToday?' today':'')+'"><span class="d">'+day+'</span></div>';
    }
  }
  root.innerHTML =
    '<div class="cal-nav"><button onclick="moveMonth(-1)">‹</button>'
    + '<span class="title">'+calY+'年 '+(calM+1)+'月</span>'
    + '<button onclick="moveMonth(1)">›</button></div>'
    + '<div class="grid">'+['日','一','二','三','四','五','六'].map(w=>'<div class="wd">'+w+'</div>').join('')+cells+'</div>'
    + '<div class="legend">'
    + '<span><i style="background:var(--A)"></i>A 胸+肱三</span>'
    + '<span><i style="background:var(--B)"></i>B 背+肱二</span>'
    + '<span><i style="background:var(--C)"></i>C 胸+肱三</span>'
    + '<span><i style="background:var(--D)"></i>D 臀腿+肩</span>'
    + '<span>✓ 已完成 · 点训练日可补卡</span></div>';
}
function moveMonth(delta){
  calM += delta;
  if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;}
  renderCal();
}
function jumpTo(y,m,day){
  viewDate = new Date(y,m,day);
  switchTab('today');
}

/* ---------- tabs ---------- */
function switchTab(t){
  const today = t==='today';
  document.getElementById('todayView').classList.toggle('hide',!today);
  document.getElementById('calView').classList.toggle('hide',today);
  document.getElementById('tabToday').classList.toggle('on',today);
  document.getElementById('tabCal').classList.toggle('on',!today);
  if(today){ renderToday(); }
  else {
    if(calY===undefined){ const n=new Date(); calY=n.getFullYear(); calM=n.getMonth(); }
    renderCal();
  }
}

/* ---------- init ---------- */
renderToday();
</script>
</body>
</html>
